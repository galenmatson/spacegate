server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /map-tiles/index.json {
        alias /usr/share/nginx/map-tiles/index.json;
        default_type application/json;
        add_header Cache-Control "public, max-age=30, must-revalidate" always;
    }

    location ~ ^/map-tiles/radius-(100|250|500|1000)/manifest\.json$ {
        alias /usr/share/nginx/map-tiles/radius-$1/manifest.json;
        default_type application/json;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
    }

    location ~ "^/map-tiles/radius-(100|250|500|1000)/tiles/([0-9a-f]{64})\.sgtile\.gz$" {
        alias /usr/share/nginx/map-tiles/radius-$1/tiles/$2.sgtile.gz;
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /map-tiles/ {
        return 404;
    }

    location = /admin {
        return 308 /admin/;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        try_files $uri /index.html;
    }
}
